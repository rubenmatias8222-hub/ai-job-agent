<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <h2>AI Job Agent</h2>
        <button onclick="runMatch()">📊 Match</button>
        <button onclick="runOptimize()">🧠 Optimize</button>
        <button onclick="loadHistory()">📚 History</button>
    </div>

    <div class="main">

        <div class="topbar">
            <h1>Resume Matcher</h1>
        </div>

        <form id="matchForm">
            <label for="resume">Your Resume:</label>
            <textarea id="resume" placeholder="Paste your resume here..."></textarea>

            <label for="job_description">Job Description:</label>
            <textarea id="job_description" placeholder="Paste job description here..."></textarea>

            <button type="submit">Match Resume</button>
        </form>

        <div id="result"></div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
